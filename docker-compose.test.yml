# ── docker-compose.test.yml ──────────────────────────────────
# Auto TLS via sslip.io. No DNS setup needed.
#
# Usage:
#   DOMAIN=159.195.31.11.sslip.io docker compose -f docker-compose.test.yml up -d
#
# Access:
#   Website:    https://shroom-mates.159.195.31.11.sslip.io
#   Storefront: https://shop.159.195.31.11.sslip.io
#   Medusa:     https://api.159.195.31.11.sslip.io

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
      - ./apps/website/dist:/srv/website:ro
    depends_on:
      medusa:
        condition: service_started
      storefront:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shroom-mates}
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - test_redis_data:/data

  medusa:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shroom-mates}?sslmode=disable
      REDIS_URL: redis://redis:6379
      MEDUSA_BACKEND_URL: https://api.${DOMAIN}
      STORE_CORS: https://shop.${DOMAIN},https://shroom-mates.${DOMAIN}
      ADMIN_CORS: https://api.${DOMAIN}
      AUTH_CORS: https://api.${DOMAIN},https://shop.${DOMAIN}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
      SUMUP_MEDUSA_URL: ${SUMUP_MEDUSA_URL:-}
      SUMUP_REDIRECT_URL: ${SUMUP_REDIRECT_URL:-}
    volumes:
      - test_medusa_uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        PUBLIC_MEDUSA_BACKEND_URL: https://api.${DOMAIN}
        PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-}
        PUBLIC_SITE_URL: https://shop.${DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_MEDUSA_BACKEND_URL: https://api.${DOMAIN}
      APP_TRUST_PROXY: "true"
    depends_on:
      - medusa

volumes:
  test_postgres_data:
  test_redis_data:
  test_medusa_uploads:
