# ── docker-compose.test.yml ──────────────────────────────────
# Self-signed TLS, no DNS needed. Accept cert warning in browser.
# Set DOMAIN in .env or export DOMAIN=159.195.31.11
#
# Usage:
#   DOMAIN=159.195.31.11 docker compose -f docker-compose.test.yml up -d
#
# Access (accept self-signed cert warning):
#   Website:    https://${DOMAIN}
#   Storefront: https://${DOMAIN}:4443
#   Medusa API: https://${DOMAIN}:9443/health
#   Medusa Admin: https://${DOMAIN}:9443/app

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
      - "4443:4443"
      - "9443:9443"
    volumes:
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
      - ./apps/website/dist:/srv/website:ro
    depends_on:
      medusa:
        condition: service_started
      storefront:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shroom-mates}
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - test_redis_data:/data

  medusa:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shroom-mates}?sslmode=disable
      REDIS_URL: redis://redis:6379
      MEDUSA_BACKEND_URL: https://${DOMAIN}:9443
      STORE_CORS: https://${DOMAIN}:4443,https://${DOMAIN}
      ADMIN_CORS: https://${DOMAIN}:9443
      AUTH_CORS: https://${DOMAIN}:9443,https://${DOMAIN}:4443
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
      SUMUP_MEDUSA_URL: ${SUMUP_MEDUSA_URL:-}
      SUMUP_REDIRECT_URL: ${SUMUP_REDIRECT_URL:-}
    volumes:
      - test_medusa_uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        PUBLIC_MEDUSA_BACKEND_URL: https://${DOMAIN}:9443
        PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_MEDUSA_BACKEND_URL: https://${DOMAIN}:9443
    depends_on:
      - medusa

volumes:
  test_postgres_data:
  test_redis_data:
  test_medusa_uploads:
