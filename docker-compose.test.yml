# ── docker-compose.test.yml ──────────────────────────────────
# No TLS, IP-based routing.
# Set DOMAIN in .env or export DOMAIN=159.195.31.11
#
# Usage:
#   DOMAIN=159.195.31.11 docker compose -f docker-compose.test.yml up -d
#
# Access:
#   Website:    http://${DOMAIN}:80
#   Storefront: http://${DOMAIN}:4321
#   Medusa API: http://${DOMAIN}:9000/health

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "4321:4321"
      - "9000:9000"
    volumes:
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
      - ./apps/website/dist:/srv/website:ro
    depends_on:
      medusa:
        condition: service_started
      storefront:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shroom-mates}
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - test_redis_data:/data

  medusa:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shroom-mates}?sslmode=disable
      REDIS_URL: redis://redis:6379
      MEDUSA_BACKEND_URL: http://${DOMAIN}:9000
      STORE_CORS: http://${DOMAIN}:4321
      ADMIN_CORS: http://${DOMAIN}:9000
      AUTH_CORS: http://${DOMAIN}:9000,http://${DOMAIN}:4321
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
      SUMUP_MEDUSA_URL: ${SUMUP_MEDUSA_URL:-}
      SUMUP_REDIRECT_URL: ${SUMUP_REDIRECT_URL:-}
    volumes:
      - test_medusa_uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        PUBLIC_MEDUSA_BACKEND_URL: http://${DOMAIN}:9000
        PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_MEDUSA_BACKEND_URL: http://${DOMAIN}:9000
    depends_on:
      - medusa

volumes:
  test_postgres_data:
  test_redis_data:
  test_medusa_uploads:
