name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: false

env:
  DEPLOY_HOST: ${{ secrets.HETZNER_HOST }}
  DEPLOY_USER: ${{ secrets.HETZNER_USER || 'deploy' }}
  DEPLOY_PATH: /opt/shroom-mates

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://shroom-mates.de
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun run --filter @shroom-mates/website build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync website dist to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            apps/website/dist/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/apps/website/dist/"

      - name: Verify site is live
        run: |
          sleep 3
          status=$(curl -o /dev/null -s -w "%{http_code}" https://shroom-mates.de)
          if [ "$status" != "200" ]; then
            echo "Unexpected HTTP status: $status"
            exit 1
          fi
          echo "✓ Site is live (HTTP $status)"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
