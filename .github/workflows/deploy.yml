name: Deploy to Hetzner

on:
  # Only fires after CI passes on main — broken code cannot reach production.
  # workflow_dispatch bypasses the gate intentionally (emergency hotfix path).
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DEPLOY_HOST: ${{ secrets.HETZNER_HOST }}
  DEPLOY_USER: ${{ secrets.HETZNER_USER || 'deploy' }}
  DEPLOY_PATH: /opt/shroom-mates

jobs:
  # ── Detect what changed ─────────────────────────────────────
  # Skipped entirely when CI failed (workflow_run.conclusion != 'success').
  detect-changes:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      website_only: ${{ steps.check.outputs.website_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_run, checkout the exact SHA that CI tested.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Check if only website changed
        id: check
        run: |
          # Manual dispatch → always do a full deploy
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "website_only=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          printf "Changed files:\n%s\n" "$CHANGED"

          NON_WEBSITE=$(echo "$CHANGED" | grep -v '^apps/website/' | grep -v '^$' || true)
          if [ -z "$NON_WEBSITE" ] && [ -n "$CHANGED" ]; then
            echo "website_only=true" >> $GITHUB_OUTPUT
          else
            echo "website_only=false" >> $GITHUB_OUTPUT
          fi

  # ── Fast path: website-only deploy (no Docker restart) ─────
  deploy-website-only:
    needs: detect-changes
    if: needs.detect-changes.outputs.website_only == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://shroom-mates.de
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun run --filter @shroom-mates/website build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync website dist to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            apps/website/dist/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/apps/website/dist/"

      - name: Smoke test
        run: |
          sleep 3
          curl --fail --silent --show-error --max-time 15 https://shroom-mates.de > /dev/null
          echo "✓ Site is live"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ── Full-stack deploy ───────────────────────────────────────
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.website_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun run --filter @shroom-mates/website build

      - name: Build storefront
        run: bun run --filter @shroom-mates/storefront build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --cache /tmp/npm-cache-sm

      - name: Build backend
        working-directory: backend
        run: npx medusa build

      - name: Upload website dist
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: apps/website/dist/
          retention-days: 1

  deploy-full:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://shroom-mates.de
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download website dist
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: apps/website/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.turbo' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" << 'EOF'
            cd /opt/shroom-mates
            docker compose pull postgres redis caddy
            docker compose build medusa storefront
            docker compose up -d --remove-orphans
            echo "Waiting for health checks..."
            sleep 10
            docker compose ps
          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" << 'EOF'
            cd /opt/shroom-mates
            unhealthy=$(docker compose ps --format json | jq -r 'select(.Health != "healthy" and .Health != "") | .Name')
            if [ -n "$unhealthy" ]; then
              echo "⚠ Unhealthy services: $unhealthy"
              docker compose logs --tail=30 $unhealthy
              exit 1
            fi
            echo "✓ All services healthy"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
