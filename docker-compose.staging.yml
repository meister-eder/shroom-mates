# Staging stack — runs alongside production on the same server.
# Uses separate ports, volumes, and network for full isolation.
#
# Usage:
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d

name: shroom-staging

services:
  # ── Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shroom-mates-staging}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa} -d ${POSTGRES_DB:-shroom-mates-staging}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Sessions ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - staging_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Medusa Backend ─────────────────────────────────────────────
  medusa:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9001:9000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shroom-mates-staging}
      REDIS_URL: redis://redis:6379
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:?MEDUSA_BACKEND_URL is required}
      STORE_CORS: ${STORE_CORS:?STORE_CORS is required}
      ADMIN_CORS: ${ADMIN_CORS:?ADMIN_CORS is required}
      AUTH_CORS: ${AUTH_CORS:?AUTH_CORS is required}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
      SUMUP_MEDUSA_URL: ${SUMUP_MEDUSA_URL:-}
      SUMUP_REDIRECT_URL: ${SUMUP_REDIRECT_URL:-}
    volumes:
      - staging_medusa_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Storefront (Astro SSR) ────────────────────────────────────
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    restart: unless-stopped
    ports:
      - "4322:4321"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:?MEDUSA_BACKEND_URL is required}
    depends_on:
      medusa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4321"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  staging_postgres_data:
  staging_redis_data:
  staging_medusa_uploads:
